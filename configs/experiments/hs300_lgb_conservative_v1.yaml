name: hs300_lgb_conservative_v1
description: >
  LightGBM 保守参数版 (防止过拟合)
  因子: roe, mom250, close_to_high250
  参数: 保守树 + 严格正则

data:
  source: baostock_ashare
  snapshot_id: hs300_baostock_snapshot_v1
  start_date: '2019-01-02'
  end_date: '2026-03-28'
  universe_name: HS300
  universe_mode: point_in_time
  incremental: true
  universe_refresh_frequency_days: 5
  price_adjust: qfq
features:
  set_name: lgb_conservative
  version: v1
  names:
    - roe
    - mom250
    - close_to_high250
  winsorize_limits: [0.01, 0.99]
  zscore: true
  fill_missing: true
label:
  name: fwd_return_20d
  horizon: 20
model:
  family: lightgbm_regression
  version: v1
  registry_stage: research
  fallback_model: roe_zscore
  train_window_days: 500
  valid_window_days: 0
  min_train_samples: 100
  params:
    num_leaves: 15
    max_depth: 4
    learning_rate: 0.03
    n_estimators: 200
    min_child_samples: 100
    feature_fraction: 0.7
    bagging_fraction: 0.7
    bagging_freq: 1
    lambda_l1: 0.0
    lambda_l2: 10.0
signal:
  name: cross_sectional_score
  version: v1
portfolio:
  top_n: 40
  weighting: equal
  gross_exposure: 1.0
  defensive_gross: 0.50
  max_single_weight: 0.04
  min_trade_value: 3000
  market_filter_lookback: 60
  market_filter_threshold: 0.0
  candidate_filter_mode: strict_ashare
  constructor: qmt_topn_equal_weight
  cash_buffer: 0.0
backtest:
  initial_cash: 1000000
  lot_size: 100
  commission_bps: 0.75
  stamp_duty_bps: 10
  slippage_bps: 5
  rebalance_frequency_days: 10
  trade_delay_days: 1
  anchor_mode: fixed
  anchor_date: '2019-01-02'
  execution_constraint_mode: strict_ashare
evaluation:
  suite: basic_factor_diagnostics
  version: v1
  params:
    quantiles: 5
enhancer:
  enabled: false