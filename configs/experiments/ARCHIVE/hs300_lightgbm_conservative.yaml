name: hs300_lightgbm_conservative
description: >
  保守优化版策略
  - 更严格的市场过滤
  - 牛市降低暴露
data:
  source: baostock_ashare
  snapshot_id: hs300_baostock_snapshot_v1
  start_date: '2024-01-02'
  end_date: '2026-03-28'
  universe_name: HS300
  universe_mode: point_in_time
  incremental: true
  universe_refresh_frequency_days: 5
  price_adjust: qfq
features:
  set_name: hs300_multifactor_v1
  version: v1
  names:
    - mom20
    - mom60
    - mom120
    - rev5
    - vol20
    - vol60
    - liq20
  winsorize_limits: [0.01, 0.99]
  zscore: true
  fill_missing: true
label:
  name: fwd_return_20d
  horizon: 20
model:
  family: lightgbm_regression
  version: v1
  registry_stage: research
  fallback_model: mom60_zscore
  fallback_feature: mom60
  score_blend_feature: mom60
  score_blend_weight_model: 0.85
  score_blend_weight_feature: 0.15
  label_clip: [-0.30, 0.30]
  train_window_days: 380
  valid_window_days: 0
  min_train_samples: 600
  training_embargo_days: 0
  params:
    n_estimators: 220
    learning_rate: 0.04
    num_leaves: 95
    max_depth: 6
    subsample: 0.85
    subsample_freq: 1
    colsample_bytree: 0.9
    min_child_samples: 35
    reg_lambda: 2.0
    random_state: 42
    verbosity: -1
signal:
  name: cross_sectional_score
  version: v1
  params: {}
portfolio:
  top_n: 40
  weighting: equal
  gross_exposure: 1.0
  defensive_gross: 0.45
  max_single_weight: 0.04
  cash_buffer: 0.0
  min_trade_value: 5000
  market_filter_lookback: 60
  market_filter_threshold: 0.02
  risk_model: qmt_style_ladder
  risk_ma_short_window: 60
  risk_ma_long_window: 120
  risk_momentum_window: 20
  risk_mid_exposure: 0.80
  risk_low_exposure: 0.55
  risk_crash_exposure: 0.35
  candidate_filter_mode: strict_ashare
  constructor: qmt_topn_equal_weight
backtest:
  initial_cash: 1000000
  lot_size: 100
  commission_bps: 0.75
  stamp_duty_bps: 10
  slippage_bps: 5
  rebalance_frequency_days: 10
  trade_delay_days: 1
  anchor_mode: fixed
  anchor_date: '2022-09-01'
  execution_constraint_mode: strict_ashare
evaluation:
  suite: basic_factor_diagnostics
  version: v1
  params:
    quantiles: 5
