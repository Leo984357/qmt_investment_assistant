name: hs300_lightgbm_live_adapted
description: >
  Live-oriented A-share adaptation of the HS300 LightGBM multifactor strategy.
  It keeps the v3 research logic intact at the signal layer, then applies next-day
  execution, strict tradability filters, commissions, stamp duty, slippage, and
  small-account capital constraints for more realistic implementation review.
data:
  source: baostock_ashare
  snapshot_id: hs300_baostock_snapshot_live_adapted
  start_date: '2020-01-02'
  end_date: latest_completed
  universe_name: HS300
  universe_mode: point_in_time
  incremental: true
  universe_refresh_frequency_days: 1
  price_adjust: qfq
  n_symbols_master: null
  n_universe: null
  seed: null
features:
  set_name: hs300_multifactor_live
  version: v1
  names:
    - mom20
    - mom60
    - mom120
    - rev5
    - vol20
    - vol60
    - liq20
  winsorize_limits: [0.0, 1.0]
  zscore: false
  fill_missing: false
label:
  name: fwd_return_20d
  horizon: 20
model:
  family: lightgbm_regression
  version: v1
  registry_stage: research
  fallback_model: mom60_zscore
  fallback_feature: mom60
  score_blend_feature: mom60
  score_blend_weight_model: 0.85
  score_blend_weight_feature: 0.15
  label_clip: [-0.3, 0.3]
  train_window_days: 380
  valid_window_days: 0
  min_train_samples: 600
  params:
    n_estimators: 220
    learning_rate: 0.04
    num_leaves: 95
    max_depth: 6
    subsample: 0.85
    subsample_freq: 1
    colsample_bytree: 0.9
    min_child_samples: 35
    reg_lambda: 2.0
    random_state: 42
    verbosity: -1
signal:
  name: cross_sectional_score
  version: v1
  params: {}
portfolio:
  top_n: 25
  weighting: equal
  gross_exposure: 1.0
  defensive_gross: 0.45
  max_single_weight: 0.05
  cash_buffer: 0.0
  min_trade_value: 0
  market_filter_lookback: 20
  market_filter_threshold: 0.0
  risk_model: qmt_style_ladder
  risk_ma_short_window: 60
  risk_ma_long_window: 120
  risk_momentum_window: 20
  risk_mid_exposure: 0.85
  risk_low_exposure: 0.65
  risk_crash_exposure: 0.45
  candidate_filter_mode: strict_ashare
  constructor: qmt_topn_equal_weight
backtest:
  initial_cash: 250000
  lot_size: 100
  commission_bps: 0.75
  stamp_duty_bps: 10
  slippage_bps: 20
  rebalance_frequency_days: 5
  trade_delay_days: 1
  anchor_mode: follow_backtest_start
  anchor_date: null
  execution_constraint_mode: strict_ashare
evaluation:
  suite: basic_factor_diagnostics
  version: v1
  params:
    quantiles: 5
