# 最终推荐配置 - 经策略发现流程验证
# 2026-04-12
# ⚠️ 旧策略格式，已迁移到 hs300_ridge_final.yaml

name: hs300_discovery_final
description: >
  小资金(25万)最优配置
  经完整因子筛选与策略发现流程验证
  因子: 从26个候选 → 6个精选
  模型: Ridge回归
  OOS Sharpe: 0.160

  ⚠️ 此配置文件为旧格式参考，建议使用 hs300_ridge_final.yaml

data:
  source: baostock_ashare
  snapshot_id: hs300_baostock_snapshot_v1
  start_date: '2022-09-01'
  end_date: '2026-03-28'
  universe_name: HS300
  universe_mode: point_in_time
  incremental: true
  universe_refresh_frequency_days: 5
  price_adjust: qfq
features:
  set_name: discovery_final_factors
  version: v1
  names:
    - earnings_yield
    - operating_margin
    - gross_margin
    - roe_change
    - profit_growth
    - revenue_growth
  winsorize_limits: [0.01, 0.99]
  zscore: true
  fill_missing: true
label:
  name: fwd_return_20d
  horizon: 20
model:
  family: ridge_regression
  version: v1
  registry_stage: production
  fallback_model: earnings_yield_zscore
  train_window_days: 500
  valid_window_days: 0
  min_train_samples: 100
  fallback_feature: earnings_yield
  params:
    alpha: 1.0
signal:
  name: cross_sectional_score
  version: v1
  params: {}
portfolio:
  top_n: 15
  weighting: equal
  gross_exposure: 1.0
  defensive_gross: 0.50
  max_single_weight: 0.067
  cash_buffer: 0.0
  min_trade_value: 2000
  market_filter_lookback: 60
  market_filter_threshold: 0.0
  risk_model: none
  candidate_filter_mode: strict_ashare
  constructor: qmt_topn_equal_weight
backtest:
  initial_cash: 250000
  lot_size: 100
  commission_bps: 0.75
  stamp_duty_bps: 10
  slippage_bps: 5
  rebalance_frequency_days: 10
  trade_delay_days: 1
  anchor_mode: fixed
  anchor_date: '2022-09-01'
  execution_constraint_mode: strict_ashare
evaluation:
  suite: basic_factor_diagnostics
  version: v1
  params:
    quantiles: 5
