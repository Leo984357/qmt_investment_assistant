name: hs300_simple_average_v1
description: Model comparison - simple_average with professional factors

model:
  registry_stage: research

allow_rejected_factors: true

data:
  source: baostock_ashare
  snapshot_id: hs300_baostock_snapshot_v1
  start_date: '2022-09-01'
  end_date: '2026-03-28'
  universe_name: HS300
  universe_mode: point_in_time
  incremental: true
  price_adjust: qfq

features:
  set_name: professional_factors
  version: v1
  names:
    - alpha_025
    - alpha_016
    - alpha_006
    - alpha_014
    - amihud_illiq_5d
    - illiquidity
    - roe_ttm
    - ps_ratio
    - long_term_reversal
    - short_term_reversal
    - narrow_range_60
    - volume_momentum_5d
  winsorize_limits: [0.01, 0.99]
  zscore: true
  fill_missing: true

label:
  name: fwd_return_20d
  horizon: 20

model:
  family: simple_average
  version: v1
  registry_stage: diagnostic
  train_window_days: 500
  fallback_feature: earnings_yield
  min_train_samples: 100
  valid_window_days: 0
  fallback_model: earnings_yield_zscore

allow_rejected_factors: true

portfolio:
  top_n: 15
  weighting: equal
  gross_exposure: 1.0
  defensive_gross: 0.50
  max_single_weight: 0.067
  cash_buffer: 0.0
  min_trade_value: 2000
  market_filter_lookback: 60
  market_filter_threshold: 0.0
  risk_model: none
  candidate_filter_mode: strict_ashare
  constructor: qmt_topn_equal_weight

backtest:
  initial_cash: 250000
  lot_size: 100
  commission_bps: 0.75
  stamp_duty_bps: 10
  slippage_bps: 5
  rebalance_frequency_days: 10
  trade_delay_days: 1
  anchor_mode: fixed
  anchor_date: '2022-09-01'
  execution_constraint_mode: strict_ashare

evaluation:
  suite: basic_factor_diagnostics

enhancer:
  enabled: false